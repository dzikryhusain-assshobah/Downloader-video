<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Downloader</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #111; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .card { background: #1e1e1e; padding: 2rem; border-radius: 12px; width: 100%; max-width: 480px; }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; text-align: center; }
    input { width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #eee; font-size: 1rem; margin-bottom: 1rem; }
    button { width: 100%; padding: 0.75rem; border-radius: 8px; border: none; background: #4f8ef7; color: #fff; font-size: 1rem; cursor: pointer; }
    button:disabled { background: #555; cursor: not-allowed; }
    #status { margin-top: 1rem; font-size: 0.9rem; text-align: center; color: #aaa; min-height: 1.2rem; }
    #status.error { color: #f66; }
    #status.success { color: #6f6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎬 Video Downloader</h1>
    <input type="text" id="urlInput" placeholder="Paste URL video di sini..." />
    <button id="dlBtn" onclick="startDownload()">Download</button>
    <div id="status"></div>
  </div>

  <script>
    // Daftarkan service worker untuk PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(console.error);
    }

    const BACKEND_URL = 'https://downloader-video-production.up.railway.app';

    async function startDownload() {
      const url = document.getElementById('urlInput').value.trim();
      const status = document.getElementById('status');
      const btn = document.getElementById('dlBtn');

      if (!url) {
        setStatus('Masukkan URL dulu.', 'error');
        return;
      }

      btn.disabled = true;
      setStatus('Menghubungi server...');

      try {
        const res = await fetch(`${BACKEND_URL}/download`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Server error');
        }

        // Backend kirim file langsung → trigger download di browser
        const blob = await res.blob();
        const disposition = res.headers.get('Content-Disposition') || '';
        const filename = disposition.split('filename=')[1]?.replace(/"/g, '') || 'video.mp4';

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);

        setStatus('Download berhasil!', 'success');
      } catch (err) {
        setStatus('Gagal: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }
  </script>
</body>
</html>
